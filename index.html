<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> SOSA | Personal Training</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      background: #0a0a0a;
      color: #fff;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }

    header {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                  url('images/photo1.jpg') center/cover no-repeat;
      animation: fadeIn 1.5s ease;
    }

    header h1 {
      font-size: 3em;
      margin: 0;
    }

    header p {
      color: #ccc;
      margin-top: 15px;
    }

    section {
      padding: 50px 20px;
      text-align: center;
    }

    section:first-of-type {
      padding-top: 20px;
    }

    .hidden {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery img {
      width: 260px;
      margin: 12px;
      border-radius: 10px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
    }

    /* CERTIFICATE */
    .certificate {
      width: 280px;
      margin-top: 25px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.4s ease;
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
    }

    .certificate:hover {
      transform: scale(1.03);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .modal img {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 80vh;
      border-radius: 10px;
    }

    .modal:target {
      display: block;
    }

    form {
      max-width: 500px;
      margin: auto;
      text-align: left;
      background: #111;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255,255,255,0.05);
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      background: #1a1a1a;
      color: #fff;
    }

    input::placeholder, textarea::placeholder {
      color: #777;
    }

    button {
      background: gold;
      color: black;
      padding: 15px;
      border: none;
      width: 100%;
      font-size: 1.1em;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s ease;
    }

    button:hover {
      background: #d4af37;
      transform: translateY(-2px);
    }

    section h2 {
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <h1>Get Fit with Nick!</h1>
  <p>Personal Trainer | ISSA Certified | Transform Your Body & Mind</p>
</header>

<section class="hidden">
  <h2>About Me</h2>
  <p>I help clients achieve their fitness goals through personalized training programs and accountability.</p>

  <!-- CLICKABLE CERTIFICATE -->
  <a href="#certModal">
    <img src="images/certificate.jpg" alt="Training Certificate" class="certificate">
  </a>

  <p style="color:#aaa; font-size:0.9em; margin-top:10px;">
    ISSA Certified Personal Trainer
  </p>
</section>

<!-- MODAL -->
<div id="certModal" class="modal">
  <a href="#">
    <img src="images/certificate.jpg" alt="Certificate Full View">
  </a>
</div>

<section class="gallery hidden">
  <h2>My Journey</h2>
  <img src="images/photo1.jpg">
  <img src="images/photo2.jpg">
  <img src="images/photo3.jpg">
</section>

<section class="hidden">
  <h2>Start Your Transformation</h2>

  <form action="https://formspree.io/f/xpqkddnv" method="POST">
    
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Height</label>
    <input type="text" name="height" required>

    <label>Weight</label>
    <input type="text" name="weight" required>

    <label>Your Goal</label>
    <select name="goal" id="goalSelect" required>
      <option value="">Select your goal</option>
      <option>Lose Weight</option>
      <option>Tone Muscles</option>
      <option>Gain / Bulk Muscle</option>
      <option>Improve Overall Fitness</option>
      <option>Better Nutrition Plan</option>
      <option value="other">Other</option>
    </select>

    <input type="text" name="custom_goal" id="customGoal" placeholder="Enter your specific goal" style="display:none;">

    <label>Preferred Contact Method</label>
    <select id="contactMethod" required>
      <option value="">Select one</option>
      <option value="phone">Phone</option>
      <option value="email">Email</option>
    </select>

    <input type="text" name="phone" id="phoneInput" placeholder="Enter your phone number" style="display:none;">
    <input type="email" name="email" id="emailInput" placeholder="Enter your email" style="display:none;">

    <label>Budget</label>
    <select name="budget" required>
      <option value="">Select your budget</option>
      <option>$50 - $100 / week</option>
      <option>$100 - $200 / week</option>
      <option>$200+ / week</option>
      <option>$100 - $300 / month</option>
      <option>$300 - $600 / month</option>
      <option>$600+ / month</option>
    </select>

    <button type="submit">Submit Inquiry</button>

  </form>
</section>

<script>
  const goalSelect = document.getElementById("goalSelect");
  const customGoal = document.getElementById("customGoal");

  goalSelect.addEventListener("change", function() {
    customGoal.style.display = this.value === "other" ? "block" : "none";
    customGoal.required = this.value === "other";
  });

  const contactMethod = document.getElementById("contactMethod");
  const phoneInput = document.getElementById("phoneInput");
  const emailInput = document.getElementById("emailInput");

  contactMethod.addEventListener("change", function() {
    phoneInput.style.display = "none";
    emailInput.style.display = "none";
    phoneInput.required = false;
    emailInput.required = false;

    if (this.value === "phone") {
      phoneInput.style.display = "block";
      phoneInput.required = true;
    } else if (this.value === "email") {
      emailInput.style.display = "block";
      emailInput.required = true;
    }
  });

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  document.querySelectorAll('.hidden').forEach(el => observer.observe(el));
</script>

</body>
</html>
