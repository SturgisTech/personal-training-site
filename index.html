<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SOSA | Personal Training</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      background: #0a0a0a;
      color: #fff;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }

    header {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                  url('images/photo1.jpg') center/cover no-repeat;
      animation: fadeIn 1.5s ease;
    }

    header h1 {
      font-size: 3em;
      margin: 0;
    }

    header p {
      color: #ccc;
      margin-top: 15px;
    }

    section {
      padding: 50px 20px;
      text-align: center;
    }

    .hidden {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    /* GALLERY */
    .scroll-gallery {
      display: flex;
      gap: 25px;
      overflow-x: auto;
      padding: 40px 20px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      align-items: center;
    }

    .scroll-gallery::-webkit-scrollbar {
      display: none;
    }

    .scroll-gallery {
      scrollbar-width: none;
    }

    .scroll-gallery img {
      flex: 0 0 auto;
      height: 420px;
      width: auto;
      max-width: 85vw;
      object-fit: contain;

      border-radius: 12px;
      scroll-snap-align: center;

      opacity: 0.35;
      transform: scale(0.88);
      transition: all 0.35s ease;
      cursor: pointer;
    }

    .scroll-gallery img.active {
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 15px 40px rgba(255, 215, 0, 0.25);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal img {
      max-width: 90%;
      max-height: 85vh;
      border-radius: 12px;
    }

    /* FORM */
    form {
      max-width: 500px;
      margin: auto;
      text-align: left;
      background: #111;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255,255,255,0.05);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      background: #1a1a1a;
      color: #fff;
    }

    button {
      background: gold;
      color: black;
      padding: 15px;
      border: none;
      width: 100%;
      font-size: 1.1em;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    /* CHECKBOX GROUP */
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 10px 0 20px;
      background: #1a1a1a;
      padding: 12px;
      border-radius: 5px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95em;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <h1>Get Fit with Nick!</h1>
  <p>Personal Trainer | ISSA Certified | Transform Your Body & Mind</p>
</header>

<section class="hidden">
  <h2>About Me</h2>
  <p>I help clients achieve their fitness goals through personalized training programs and accountability.</p>
</section>

<section class="hidden">
  <h2>Certification</h2>
  <img src="images/certificate.jpg" class="certificate" onclick="openModal(this.src)">
</section>

<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<section class="hidden">
  <h2>My Journey</h2>

  <div class="scroll-gallery">
    <img src="images/photo1.jpg" onclick="openModal(this.src)">
    <img src="images/photo2.jpg" onclick="openModal(this.src)">
    <img src="images/photo3.jpg" onclick="openModal(this.src)">
  </div>
</section>

<section class="hidden">
  <h2>Start Your Transformation</h2>

  <form action="https://formspree.io/f/xpqkddnv" method="POST">

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Height</label>
    <input type="text" name="height" required>

    <label>Weight</label>
    <input type="text" name="weight" required>

    <label>Your Goal (select all that apply)</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="goal[]" value="Lose Weight"> Lose Weight</label>
      <label><input type="checkbox" name="goal[]" value="Tone Muscles"> Tone Muscles</label>
      <label><input type="checkbox" name="goal[]" value="Gain Muscle"> Gain / Build Muscle</label>
      <label><input type="checkbox" name="goal[]" value="Improve Fitness"> Improve Overall Fitness</label>
      <label><input type="checkbox" name="goal[]" value="Nutrition Plan"> Better Nutrition Plan</label>
    </div>

    <button type="submit">Submit Inquiry</button>
  </form>
</section>

<script>
  const gallery = document.querySelector('.scroll-gallery');
  const images = document.querySelectorAll('.scroll-gallery img');

  function updateActive() {
    const center = gallery.scrollLeft + gallery.offsetWidth / 2;

    images.forEach(img => {
      const imgCenter = img.offsetLeft + img.offsetWidth / 2;
      const distance = Math.abs(center - imgCenter);
      img.classList.toggle("active", distance < 250);
    });
  }

  gallery.addEventListener("scroll", updateActive);
  window.addEventListener("load", updateActive);

  function openModal(src) {
    document.getElementById("modalImg").src = src;
    document.getElementById("modal").classList.add("show");
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("show");
  }

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  document.querySelectorAll('.hidden').forEach(el => observer.observe(el));
</script>

</body>
</html>
